{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Importer les inscriptions</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>
<body class="p-4">

<div class="container">
    <h2 class="mb-4">Importer les inscriptions pour l’événement : {{ evenement.titre }}</h2>

    <form method="post" enctype="multipart/form-data" class="card p-4 shadow">
        {% csrf_token %}

        <div class="mb-3">
            <label for="fichier_excel" class="form-label">Fichier Excel (.xlsx)</label>
            <input type="file" name="fichier_excel" id="fichier_excel" class="form-control" accept=".xlsx" required>
        </div>

        <button type="submit" class="btn btn-primary">Importer</button>
        <a href="{% url 'evenements:import_evenement' evenement.id %}" class="btn btn-success">
            Télécharger le modèle
        </a>
    </form>

    {% if messages %}
        <div class="mt-4">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
</div>

</body>
</html>
